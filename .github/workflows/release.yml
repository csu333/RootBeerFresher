name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('gradle/wrapper/gradle-wrapper.properties', '**/*.gradle.kts', 'gradle/libs.versions.toml') }}
          restore-keys: gradle-

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Extract version from tag
        id: version
        run: |
          TAG=${GITHUB_REF#refs/tags/v}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$TAG"
          echo "name=$TAG" >> $GITHUB_OUTPUT
          echo "code=$((MAJOR * 10000 + MINOR * 100 + PATCH))" >> $GITHUB_OUTPUT

      - name: Decode keystore
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_B64" | base64 -d > /tmp/keystore.jks

      - name: Build signed release APK
        env:
          KEYSTORE_PATH: /tmp/keystore.jks
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          VERSION_NAME: ${{ steps.version.outputs.name }}
          VERSION_CODE: ${{ steps.version.outputs.code }}
        run: |
          ./gradlew assembleRelease \
            "-PversionName=$VERSION_NAME" \
            "-PversionCode=$VERSION_CODE"

      - name: Clean up keystore
        if: always()
        run: rm -f /tmp/keystore.jks

      - name: Upload release to GitHub
        uses: softprops/action-gh-release@v2
        with:
          name: Release v${{ steps.version.outputs.name }}
          generate_release_notes: true
          files: app/build/outputs/apk/release/app-release.apk
